name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      # CI 只做 lint/typecheck/test/bundle，不启动 Electron——跳过二进制下载
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run typecheck:electron
      - run: npm test
      - run: npm run build:electron && npx vite build
        name: build (renderer + electron bundle)
